name: Feature Request
description: 建议一个新功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议。请先确认该功能不在 README「暂不包含」列表中。
  - type: textarea
    id: problem
    attributes:
      label: 问题/痛点
      description: 你遇到了什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望怎样解决？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
  - type: checkboxes
    id: scope
    attributes:
      label: Scope 确认
      options:
        - label: 这个功能不在 README「暂不包含」列表中
          required: true
        - label: 这个功能符合 SkillVault 本地优先、单人使用的定位
          required: true
