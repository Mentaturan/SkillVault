name: Bug Report
description: 报告一个 bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 bug。请尽量提供复现步骤。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现？
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本
      description: SkillVault 版本号
      placeholder: "1.3.0"
  - type: input
    id: platform
    attributes:
      label: 平台
      description: macOS / Windows / iOS / 浏览器
      placeholder: "macOS 15"
  - type: textarea
    id: logs
    attributes:
      label: 相关日志或截图
      description: 如有错误日志或截图请贴在这里
